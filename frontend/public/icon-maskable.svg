<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="قناوي">
  <defs>
    <linearGradient id="mBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset=".55" stop-color="#075985"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="mGold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset=".45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="mGlow" cx=".5" cy=".42" r=".5">
      <stop offset="0" stop-color="#fde68a" stop-opacity=".3"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background (Android masks to circle/squircle) -->
  <rect width="512" height="512" fill="url(#mBg)"/>
  <rect width="512" height="512" fill="url(#mGlow)"/>

  <!-- Safe-area content scaled to ~60% of canvas, centered -->
  <g transform="translate(102 110) scale(0.6)">
    <!-- Sun -->
    <circle cx="256" cy="168" r="58" fill="url(#mGold)"/>
    <g stroke="url(#mGold)" stroke-width="12" stroke-linecap="round">
      <line x1="256" y1="70"  x2="256" y2="94"/>
      <line x1="166" y1="168" x2="190" y2="168"/>
      <line x1="322" y1="168" x2="346" y2="168"/>
      <line x1="190" y1="104" x2="208" y2="122"/>
      <line x1="304" y1="122" x2="322" y2="104"/>
    </g>
    <!-- Arch -->
    <path d="M80 380 V254 A176 176 0 0 1 432 254 V380"
          stroke="url(#mGold)" stroke-width="26" fill="none" stroke-linecap="round"/>
    <path d="M118 380 V262 A138 138 0 0 1 394 262 V380"
          fill="#083349" opacity=".55"/>
    <!-- Dots -->
    <circle cx="230" cy="136" r="9" fill="#fff" opacity=".9"/>
    <circle cx="282" cy="136" r="9" fill="#fff" opacity=".9"/>
    <!-- Waves -->
    <path d="M48 432 Q112 408 176 432 T304 432 T432 432 T480 424"
          stroke="#7dd3fc" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M48 472 Q112 448 176 472 T304 472 T432 472 T480 464"
          stroke="#38bdf8" stroke-width="12" fill="none" stroke-linecap="round" opacity=".8"/>
  </g>
</svg>
